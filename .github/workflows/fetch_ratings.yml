name: Fetch AtCoder Ratings

on:
  schedule:
    - cron: "0 * * * *"  # 1時間おきに実行
  workflow_dispatch:       # 手動実行ボタンも有効にする

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch ratings
        run: node fetch_ratings.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ratings.json
          git diff --cached --quiet || git commit -m "Update ratings $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          git push